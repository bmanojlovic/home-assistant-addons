name: ci

on:
  push:
    branches:
      - "main"
      - "python"
      - "shell"
  pull_request:
    branches:
      - "main"

env:
  MONITORED_FILES: "build.yaml config.yaml Dockerfile run.py backup.py common.py restore.py apparmor.txt DOCS.md CHANGELOG.md"

jobs:
  init:
    runs-on: ubuntu-latest
    name: Initialize builds
    outputs:
      changed_addons: ${{ steps.changed_addons.outputs.addons }}
      changed: ${{ steps.changed_addons.outputs.changed }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get changed files
        id: changed_files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            */{build.yaml,config.yaml,Dockerfile,run.py,backup.py,common.py,restore.py}

      - name: Find add-on directories
        id: addons
        uses: home-assistant/actions/helpers/find-addons@master

      - name: Get changed add-ons
        id: changed_addons
        run: |
          declare -a changed_addons
          for addon in ${{ steps.addons.outputs.addons }}; do
            for changed_file in ${{ steps.changed_files.outputs.all_changed_files }}; do
              if [[ "$changed_file" == "$addon/"* ]]; then
                for monitored_file in ${{ env.MONITORED_FILES }}; do
                  if [[ "$changed_file" == "$addon/$monitored_file" ]]; then
                    if [[ ! " ${changed_addons[*]} " =~ " \"${addon}\", " ]]; then
                      changed_addons+=("\"${addon}\",")
                    fi
                    break
                  fi
                done
              fi
            done
          done

          changed=$(echo "${changed_addons[@]}" | sed 's/,$//' | tr -d '\n')

          if [[ -n ${changed} ]]; then
            echo "Changed add-ons: $changed"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "addons=[$changed]" >> $GITHUB_OUTPUT
          else
            echo "No add-on had any monitored files changed (${{ env.MONITORED_FILES }})"
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "addons=[]" >> $GITHUB_OUTPUT
          fi

  build:
    needs: init
    runs-on: ubuntu-latest
    if: needs.init.outputs.changed == 'true'
    name: Build ${{ matrix.arch }} ${{ matrix.addon }} add-on
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJson(needs.init.outputs.changed_addons) }}
        arch: ["aarch64", "amd64"]
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get add-on info
        id: info
        shell: bash
        run: |
          version=$(yq -r '.version' "./${{ matrix.addon }}/config.yaml")
          image=$(yq -r '.image' "./${{ matrix.addon }}/config.yaml" | sed "s/{arch}/${{ matrix.arch }}/")
          archs=$(yq -r '.arch[]' "./${{ matrix.addon }}/config.yaml" | tr '\n' ' ')
          build_from=$(yq -r ".build_from.${{ matrix.arch }}" "./${{ matrix.addon }}/build.yaml")

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "build_from=${build_from}" >> "$GITHUB_OUTPUT"

          if [[ " ${archs} " =~ " ${{ matrix.arch }} " ]]; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
          fi

          # Collect extra build args from build.yaml
          args=""
          for key in $(yq -r '.args // {} | keys[]' "./${{ matrix.addon }}/build.yaml"); do
            val=$(yq -r ".args.${key}" "./${{ matrix.addon }}/build.yaml")
            args="${args}${key}=${val}"$'\n'
          done
          {
            echo "build_args<<EOF"
            echo "${args}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Map arch to platform
        id: platform
        shell: bash
        run: |
          declare -A map=( [amd64]=linux/amd64 [aarch64]=linux/arm64 )
          echo "platform=${map[${{ matrix.arch }}]}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.addon }} add-on
        if: steps.info.outputs.supported == 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./${{ matrix.addon }}
          platforms: ${{ steps.platform.outputs.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            BUILD_FROM=${{ steps.info.outputs.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ steps.info.outputs.version }}
            ${{ steps.info.outputs.build_args }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-${{ matrix.addon }}:${{ steps.info.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-${{ matrix.addon }}:latest
